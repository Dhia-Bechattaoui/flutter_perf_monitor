name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  pana:
    name: Pana Score Analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for authentication using OIDC
      contents: write # Required to push auto-formatted code
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      
      - name: Install pana
        run: dart pub global activate pana
      
      - name: Auto-format code
        run: |
          dart format .
          if [[ -n $(git status --porcelain) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "style: auto-format with dart format"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
      
      - name: Run pana and check score
        run: |
          OUTPUT=$(dart pub global run pana --no-warning --source path . 2>&1)
          echo "$OUTPUT"
          SCORE=$(echo "$OUTPUT" | grep -oP 'Points: \K\d+(?=/\d+)' || echo "0")
          echo "Pana score: $SCORE"
          if [ "$SCORE" -lt 160 ]; then
            echo "Pana score is below 160 (current: $SCORE)"
            exit 1
          fi

      - name: Publish to pub.dev
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dart pub publish --force
